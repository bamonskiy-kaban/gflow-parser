services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel notice

  api:
    build:
      context: ../../app
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ${LOCAL_TARGETS_DIR}:/targets
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/
    depends_on:
      redis:
        condition: service_started

  worker:
    build:
      context: ../../app
      dockerfile: Dockerfile

    # max tasks per child is 1 to avoid dissect memleak related to tar container processing
    command: taskiq worker broker:broker tasks --workers 8 --max-async-tasks 1 --max-tasks-per-child 1 --ack-type when_received --max-prefetch 1
    volumes:
      - ${LOCAL_TARGETS_DIR}:/targets
    environment:
      - REDIS_URL=redis://redis:6379/
      - EVENT_BROKER_HOST=${EVENT_BROKER_HOST}
      - EVENT_BROKER_PORT=${EVENT_BROKER_PORT}
    depends_on:
      redis:
        condition: service_started
